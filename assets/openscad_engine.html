<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #0a0a0a; color: #0f0; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; margin:0; font-family:monospace; }
        canvas { border: 1px solid #333; background: #111; max-width: 90vw; max-height: 60vh; }
        #status { margin-top: 20px; padding: 10px; border: 1px solid red; background: rgba(255,0,0,0.1); color: red; border-radius: 5px; }
    </style>
</head>
<body>
    <canvas id="renderCanvas" width="300" height="300"></canvas>
    <div id="status">🔴 Iniciando sistema...</div>

    <script>
        const ctx = document.getElementById('renderCanvas').getContext('2d');
        const statusEl = document.getElementById('status');

        // Simulamos la carga del motor interno nativo (Sin internet)
        setTimeout(() => {
            statusEl.innerHTML = "🟢 Motor Nativo Listo. Esperando Python...";
            statusEl.style.borderColor = "#0f0";
            statusEl.style.color = "#0f0";
            statusEl.style.background = "rgba(0,255,0,0.1)";
        }, 300);

        // Flet inyectará el código aquí
        function processOpenScad(code) {
            statusEl.innerHTML = "✅ Código recibido. Renderizando...";
            ctx.clearRect(0, 0, 300, 300);
            
            // Simulación WASM 2D básica
            if (code.toLowerCase().includes("sphere")) {
                ctx.fillStyle = "#2979ff"; // Azul
                ctx.beginPath(); ctx.arc(150, 150, 80, 0, 2*Math.PI); ctx.fill();
            } else {
                ctx.fillStyle = "#00e676"; // Verde
                ctx.fillRect(70, 70, 160, 160);
            }
        }
        
        // Exponer la función globalmente para Flet
        window.processOpenScad = processOpenScad;
    </script>
</body>
</html>
