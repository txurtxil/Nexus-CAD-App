<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; padding: 0; background: #0a0a0a; color: #00ff00; overflow: hidden; font-family: monospace; display: flex; flex-direction: column; height: 100vh; touch-action: none; }
        #visor-container { flex: 1; position: relative; border-bottom: 2px solid #1a1a1a; z-index: 10; cursor: grab; }
        #visor-container:active { cursor: grabbing; }
        canvas { display: block; width: 100%; height: 100%; z-index: 20; position: absolute; top: 0; left: 0; }
        
        #overlay-ui { position: absolute; top: 10px; left: 10px; z-index: 30; background: rgba(0,0,0,0.85); padding: 8px; border-radius: 8px; border: 1px solid #444; display: flex; flex-wrap: wrap; gap: 5px; max-width: 95%; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
        button { background: #0044cc; color: white; border: none; padding: 6px 10px; border-radius: 4px; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .btn-export { background: #d81b60; }
        .btn-debug { background: #f57c00; }
        .btn-tool { background: #2e7d32; }
        .btn-cam { background: #4527a0; }
        
        #bbox-info { position: absolute; bottom: 15px; right: 15px; z-index: 30; background: rgba(0,255,100,0.1); border: 1px solid #00ff00; color: #00ff00; padding: 5px 10px; border-radius: 4px; font-size: 11px; pointer-events: none; }
        
        #log-container { height: 120px; background: #050505; padding: 10px; overflow-y: auto; font-size: 11px; z-index: 40; position: relative; transition: all 0.3s ease; }
        #log-container.fullscreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; box-sizing: border-box; font-size: 14px; padding-top: 50px; z-index: 1000; background: rgba(5,5,5,0.98); }
        .log-msg { margin-bottom: 4px; border-bottom: 1px dashed #222; padding-bottom: 4px; word-wrap: break-word; }
        .error { color: #ff3333; font-weight: bold; }
        .success { color: #00e676; }
        #close-log-btn { display: none; position: absolute; top: 10px; right: 10px; background: #cc0000; font-size: 14px; padding: 8px 15px; }
        #log-container.fullscreen #close-log-btn { display: block; }
    </style>
    <script src="three.min.js"></script>
    <script src="csg.js"></script>
</head>
<body>
    <div id="visor-container">
        <div id="overlay-ui">
            <button class="btn-tool" onclick="autoRotate = !autoRotate;">🔄 Rotar</button>
            <button class="btn-cam" onclick="toggleCamera();">🎥 Perspectiva/Orto</button>
            <button class="btn-cam" onclick="cycleMaterial();">🎨 Material</button>
            <button class="btn-tool" onclick="resetCamera();">🎯 Centrar</button>
            <button class="btn-tool" onclick="zoomIn();">➕</button>
            <button class="btn-tool" onclick="zoomOut();">➖</button>
            <button class="btn-export" onclick="exportSTL();">⬇️ STL</button>
            <button class="btn-debug" onclick="toggleLog();">🖥️ DEBUG</button>
        </div>
        <div id="bbox-info">📐 Dimensiones: Calculando...</div>
        <canvas id="cvs"></canvas>
    </div>
    
    <div id="log-container">
        <button id="close-log-btn" onclick="toggleLog();">❌ Cerrar Consola</button>
    </div>
    
    <script>
        const logBox = document.getElementById('log-container');
        function logToScreen(msg, isError=false) {
            const p = document.createElement('div'); p.className = 'log-msg ' + (isError ? 'error' : (msg.includes('✓') ? 'success' : ''));
            p.innerText = '> ' + msg; logBox.appendChild(p); logBox.scrollTop = logBox.scrollHeight;
        }
        window.onerror = function(msg) { logToScreen('CRASH: ' + msg, true); return false; };
        function toggleLog() { logBox.classList.toggle('fullscreen'); }
        function decodeB64(str) { return decodeURIComponent(atob(str).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')); }

        logToScreen('Paso 1: Motor CAD Industrial (v2.5) arrancado.');

        // Inicialización Three.js
        const canvas = document.getElementById('cvs');
        const renderer = new THREE.WebGLRenderer({canvas: canvas, antialias: true, alpha: true});
        const scene = new THREE.Scene();
        
        // Cámaras duales (Perspectiva y Ortográfica)
        let isOrtho = false;
        let aspect = window.innerWidth / (window.innerHeight*0.8);
        let camRadius = 120; let d = 100;
        
        const cameraPersp = new THREE.PerspectiveCamera(45, aspect, 0.1, 2000);
        const cameraOrtho = new THREE.OrthographicCamera(-d*aspect, d*aspect, d, -d, 0.1, 2000);
        let activeCamera = cameraPersp;

        function resetCamera() { lon = 45; lat = 45; camRadius = 120; updateCamera(); }
        resetCamera();

        // Iluminación Profesional
        const ambientLight = new THREE.AmbientLight(0x404040, 1.5); scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2); dirLight.position.set(100, 200, 100); scene.add(dirLight);
        const backLight = new THREE.DirectionalLight(0xffffff, 0.5); backLight.position.set(-100, -200, -100); scene.add(backLight);
        
        const gridHelper = new THREE.GridHelper(300, 30, 0x00ff00, 0x113311); scene.add(gridHelper);
        const axesHelper = new THREE.AxesHelper( 60 ); scene.add(axesHelper); 

        // Materiales Industriales
        const matGreen = new THREE.MeshStandardMaterial({color: 0x00e676, roughness: 0.4, metalness: 0.1, side: THREE.DoubleSide});
        const matMetal = new THREE.MeshStandardMaterial({color: 0xaaaaaa, roughness: 0.3, metalness: 0.8, side: THREE.DoubleSide});
        const matGlass = new THREE.MeshStandardMaterial({color: 0x2196f3, roughness: 0.1, metalness: 0.1, transparent: true, opacity: 0.5, side: THREE.DoubleSide});
        const matWire = new THREE.MeshBasicMaterial({color: 0x00e676, wireframe: true});
        
        const materials = [matGreen, matMetal, matGlass, matWire];
        let currentMatIndex = 0;

        let mainMesh = null; let autoRotate = true; let currentCSG = null;

        // Controles de UI
        function toggleCamera() { 
            isOrtho = !isOrtho; activeCamera = isOrtho ? cameraOrtho : cameraPersp; 
            logToScreen(isOrtho ? 'Modo: Cámara Ortográfica' : 'Modo: Perspectiva Cónica');
            updateCamera(); 
        }
        function cycleMaterial() {
            currentMatIndex = (currentMatIndex + 1) % materials.length;
            if(mainMesh) mainMesh.material = materials[currentMatIndex];
        }
        const zoomIn = () => { camRadius = Math.max(10, camRadius - 20); updateCamera(); };
        const zoomOut = () => { camRadius = Math.min(800, camRadius + 20); updateCamera(); };

        // Táctil y Ratón
        let isDragging = false, prevX = 0, prevY = 0, lon = 45, lat = 45;
        let initialPinchDist = null;
        
        canvas.addEventListener('wheel', (e) => { camRadius += e.deltaY * 0.1; camRadius = Math.max(10, Math.min(800, camRadius)); updateCamera(); });
        canvas.addEventListener('mousedown', e => { isDragging = true; prevX = e.clientX; prevY = e.clientY; autoRotate=false;});
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', e => {
            if(!isDragging) return;
            lon -= (e.clientX - prevX) * 0.5; lat += (e.clientY - prevY) * 0.5;
            lat = Math.max(-85, Math.min(85, lat)); prevX = e.clientX; prevY = e.clientY; updateCamera();
        });
        canvas.addEventListener('touchstart', e => { if(e.touches.length === 1) { isDragging = true; prevX = e.touches[0].clientX; prevY = e.touches[0].clientY; autoRotate=false; } });
        window.addEventListener('touchend', () => { isDragging = false; initialPinchDist = null; });
        window.addEventListener('touchmove', e => {
            if(e.touches.length === 2) { 
                let dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                if(initialPinchDist) { camRadius -= (dist - initialPinchDist) * 0.5; camRadius = Math.max(10, Math.min(800, camRadius)); updateCamera(); }
                initialPinchDist = dist; autoRotate=false;
            } else if(e.touches.length === 1 && isDragging) { 
                lon -= (e.touches[0].clientX - prevX) * 0.5; lat += (e.touches[0].clientY - prevY) * 0.5;
                lat = Math.max(-85, Math.min(85, lat)); prevX = e.touches[0].clientX; prevY = e.touches[0].clientY; updateCamera();
            }
        });

        function updateCamera() {
            const phi = (90 - lat) * (Math.PI / 180); const theta = lon * (Math.PI / 180);
            
            // Posicionar ambas cámaras por igual
            let px = camRadius * Math.sin(phi) * Math.cos(theta);
            let py = camRadius * Math.cos(phi);
            let pz = camRadius * Math.sin(phi) * Math.sin(theta);
            
            cameraPersp.position.set(px, py, pz); cameraPersp.lookAt(0, 0, 0);
            cameraOrtho.position.set(px, py, pz); cameraOrtho.lookAt(0, 0, 0);
            
            // Escalar ortográfica basada en el zoom
            let zoomFactor = camRadius / 100;
            cameraOrtho.left = -d * aspect * zoomFactor; cameraOrtho.right = d * aspect * zoomFactor;
            cameraOrtho.top = d * zoomFactor; cameraOrtho.bottom = -d * zoomFactor;
            cameraOrtho.updateProjectionMatrix();
        }

        window.addEventListener('resize', () => {
            let h = logBox.classList.contains('fullscreen') ? window.innerHeight : window.innerHeight*0.8;
            aspect = window.innerWidth / h;
            cameraPersp.aspect = aspect; cameraPersp.updateProjectionMatrix();
            cameraOrtho.left = -d * aspect; cameraOrtho.right = d * aspect; cameraOrtho.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, h);
            updateCamera();
        });

        function updateBoundingBox(geom) {
            geom.computeBoundingBox();
            let bbox = geom.boundingBox;
            let sizeX = Math.abs(bbox.max.x - bbox.min.x).toFixed(1);
            let sizeY = Math.abs(bbox.max.y - bbox.min.y).toFixed(1);
            let sizeZ = Math.abs(bbox.max.z - bbox.min.z).toFixed(1);
            document.getElementById('bbox-info').innerText = `📐 Size: X:${sizeX} Y:${sizeY} Z:${sizeZ} mm`;
        }

        function buildGeometry(code) {
            logToScreen('Paso 8: Evaluando código CSG Javascript...');
            if(mainMesh) scene.remove(mainMesh);
            try {
                const func = new Function("CSG", code + "\nreturn main();");
                currentCSG = func(CSG); 
                
                const geom = new THREE.BufferGeometry();
                const vertices = []; const normals = [];
                currentCSG.toPolygons().forEach(poly => {
                    for(let i=2; i<poly.vertices.length; i++) {
                        let v0 = poly.vertices[0].pos, v1 = poly.vertices[i-1].pos, v2 = poly.vertices[i].pos, n = poly.plane.normal;
                        vertices.push(v0.x, v0.y, v0.z, v1.x, v1.y, v1.z, v2.x, v2.y, v2.z);
                        normals.push(n.x, n.y, n.z, n.x, n.y, n.z, n.x, n.y, n.z);
                    }
                });
                geom.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
                geom.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
                
                mainMesh = new THREE.Mesh(geom, materials[currentMatIndex]);
                scene.add(mainMesh);
                updateBoundingBox(geom);
                
                logToScreen('✓ Malla WebGL Industrial generada.');
            } catch(e) { 
                logToScreen('ERROR EN CÓDIGO: ' + e.message, true); 
            }
        }

        function exportSTL() {
            if(!currentCSG) return;
            logToScreen('Generando archivo STL sólido...');
            let stl = "solid nexus_industrial_model\n";
            currentCSG.toPolygons().forEach(poly => {
                for(let i=2; i<poly.vertices.length; i++) {
                    let v0 = poly.vertices[0].pos, v1 = poly.vertices[i-1].pos, v2 = poly.vertices[i].pos, n = poly.plane.normal;
                    stl += `facet normal ${n.x} ${n.y} ${n.z}\nouter loop\nvertex ${v0.x} ${v0.y} ${v0.z}\nvertex ${v1.x} ${v1.y} ${v1.z}\nvertex ${v2.x} ${v2.y} ${v2.z}\nendloop\nendfacet\n`;
                }
            });
            stl += "endsolid nexus_industrial_model\n";
            const blob = new Blob([stl], {type: 'text/plain'});
            const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = 'nexus_industrial.stl'; link.click();
            logToScreen('✓ Archivo STL descargado.');
        }

        function animate() {
            if(autoRotate) { lon += 0.3; updateCamera(); }
            renderer.render(scene, activeCamera);
            requestAnimationFrame(animate);
        }

        fetch('/api/get_code_b64.json').then(r => r.json()).then(data => {
            if (data.code_b64) { buildGeometry(decodeB64(data.code_b64)); updateCamera(); animate(); }
        }).catch(e => logToScreen('ERROR API: ' + e.message, true));
    </script>
</body>
</html>
