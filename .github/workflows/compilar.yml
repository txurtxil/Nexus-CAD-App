name: Compilar APK WASM

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar código
        uses: actions/checkout@v4

      - name: Arreglar nombres de archivo de Android
        run: |
          if [ -f "main.py.txt" ]; then mv main.py.txt main.py; fi
          if [ -f "Main.py" ]; then mv Main.py main.py; fi

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalar motor Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Aceptar licencias de Android
        run: yes | flutter doctor --android-licenses

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Dependencias (Flet + WebView)
        run: |
          python -m pip install --upgrade pip
          pip install flet flet-webview

      - name: Compilar el APK
        run: flet build apk

      - name: Subir archivo instalable
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-CAD-WASM-APK
          path: build/apk/**/*.apk
